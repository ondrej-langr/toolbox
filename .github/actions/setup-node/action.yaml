name: 'Setup Node.js'
description: 'Sets up Node.js'

runs:
  using: composite
  steps:
    - uses: volta-cli/action@v4

    - name: 'Install Node.js'
      shell: bash
      run: |
        volta install node

    - name: Install Corepack with Volta
      shell: bash
      run: |
        volta install corepack

    - name: Enable Corepack
      shell: bash
      run: |
        corepack enable --install-directory $VOLTA_HOME pnpm
