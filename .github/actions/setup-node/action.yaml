name: 'Setup Node.js'
description: 'Sets up Node.js'

runs:
  using: composite
  steps:
    - uses: volta-cli/action@v4

    - name: Enable Corepack
      shell: bash
      run: |
        npm i -g corepack --force
        corepack enable pnpm

